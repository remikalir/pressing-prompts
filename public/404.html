<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Pressing Prompts</title>
    <!-- GitHub Pages SPA fallback. When a user lands directly at a nested
         path like /about or /topic/bias, GitHub's static server can't find
         a file there and serves this 404.html instead. We encode the
         requested path into a query string and redirect to "/", where the
         inline script in index.html unwraps it and restores the original
         URL via history.replaceState — all before React Router boots.

         pathSegmentsToKeep = 0 because the site is hosted at the apex of
         a custom domain (pressingprompts.org). For a project-subpath
         hosting (e.g. <user>.github.io/<repo>/), this would be 1.

         Adapted from the canonical spa-github-pages technique
         (Rafael Pedicini, MIT-licensed). -->
    <script>
      (function () {
        var pathSegmentsToKeep = 0;
        var l = window.location;
        l.replace(
          l.protocol +
            "//" +
            l.hostname +
            (l.port ? ":" + l.port : "") +
            l.pathname
              .split("/")
              .slice(0, 1 + pathSegmentsToKeep)
              .join("/") +
            "/?/" +
            l.pathname
              .slice(1)
              .split("/")
              .slice(pathSegmentsToKeep)
              .join("/")
              .replace(/&/g, "~and~") +
            (l.search ? "&" + l.search.slice(1).replace(/&/g, "~and~") : "") +
            l.hash
        );
      })();
    </script>
  </head>
  <body></body>
</html>
